name: Tests

on:
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Validate NVDA source data
        run: python scripts/validate_sources.py data/nvda_sample_metrics.json

      - name: Validate AMD source data
        run: python scripts/validate_sources.py data/amd_sample_metrics.json

      - name: Validate TSMC source data
        run: python scripts/validate_sources.py data/tsmc_sample_metrics.json

      - name: Validate methodology config
        run: python scripts/validate_methodology.py

      - name: Run AMD full workflow smoke test
        run: python scripts/run_analysis.py AMD --generate-report --generate-summary --run-dcf --audit-log-path reports/ci/amd_audit_log.jsonl --reports-dir reports/ci/amd --context-root reports/ci/amd_context

      - name: Run NVDA and AMD batch workflow smoke test
        run: python scripts/run_batch_analysis.py NVDA AMD --generate-report --generate-summary --run-dcf --audit-log-path reports/ci/batch_audit_log.jsonl --reports-dir reports/ci/batch --context-root reports/ci/batch_context

      - name: Run v1.0 demo workflow
        run: python scripts/run_v1_0_demo.py --reports-dir reports/tmp_ci_v1_0_demo

      - name: Validate JSON config and data files
        shell: bash
        run: |
          python -m json.tool config/financial_metric_schema.json > /dev/null
          python -m json.tool config/methodology_buffett_ai.json > /dev/null
          python -m json.tool config/risk_rules.json > /dev/null
          python -m json.tool config/source_rules.json > /dev/null
          python -m json.tool config/watchlist.json > /dev/null
          python -m json.tool data/amd_sample_metrics.json > /dev/null
          python -m json.tool data/nvda_sample_metrics.json > /dev/null
          python -m json.tool data/tsmc_sample_metrics.json > /dev/null
          python -m json.tool data/companies/AMD/context.json > /dev/null
          python -m json.tool data/companies/AMD/dcf_assumptions.json > /dev/null
          python -m json.tool data/companies/NVDA/context.json > /dev/null
          python -m json.tool data/companies/NVDA/dcf_assumptions.json > /dev/null
          python -m json.tool data/companies/TSMC/context.json > /dev/null
          python -m json.tool data/companies/TSMC/dcf_assumptions.json > /dev/null
          python -m json.tool research_queue.json > /dev/null
          python -m json.tool tests/fixtures/nvda_expected_summary_structure.json > /dev/null
